<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dynamics Simulation</title>
    <style>
        /* Base Theme */
        body {
            background-color: #121212; /* Black/Dark Grey */
            color: #ffffff; /* White font */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        h1 {
            width: 100%;
            text-align: center;
            color: #94a3b8; /* Light blue-grey */
            margin-bottom: 40px;
        }

        /* Card Styles */
        .family-card {
            background-color: #1e293b; /* Blue-greyish hue */
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 25px;
            width: 350px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .family-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .family-header {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .parents-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .offspring-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 1px dashed #475569;
            padding-top: 15px;
        }

        .individual-card {
            background-color: #0f172a; /* Darker blue-grey for contrast */
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            flex: 1;
            min-width: 80px;
            cursor: pointer;
        }

        .individual-card:hover {
            border-color: #94a3b8;
        }

        .role-label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Overlay (Modal) Styles */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .overlay-content {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #475569;
            width: 400px;
            max-width: 90%;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
        }

        .close-btn:hover {
            color: #ffffff;
        }

        .data-row {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
        }

        /* Trait Colors (Consistent across randomizations) */
        .color-opt { color: #4ade80; } /* Optimistic: Green */
        .color-pes { color: #f87171; } /* Pessimistic: Red */
        .color-ext { color: #60a5fa; } /* Extrovert: Blue */
        .color-int { color: #c084fc; } /* Introvert: Purple */
        .color-opt-ext { color: #2dd4bf; } /* Teal */
        .color-opt-int { color: #a3e635; } /* Lime */
        .color-pes-ext { color: #fb923c; } /* Orange */
        .color-pes-int { color: #f472b6; } /* Pink */

    </style>
</head>
<body>

    <h1>Generational Dynamics Simulator</h1>
    <div id="simulation-container" style="display: flex; gap: 40px; flex-wrap: wrap; width: 100%; justify-content: center;">
        </div>

    <div id="data-overlay" class="overlay">
        <div class="overlay-content">
            <span class="close-btn" onclick="closeOverlay()">&times;</span>
            <h2 id="overlay-title">Data</h2>
            <div id="overlay-body"></div>
        </div>
    </div>

    <script>
        // 1. The 8 Personality Types Database
        const personalities = [
            { id: 0, name: "Optimistic", class: "color-opt" },
            { id: 1, name: "Pessimistic", class: "color-pes" },
            { id: 2, name: "Extrovert", class: "color-ext" },
            { id: 3, name: "Introvert", class: "color-int" },
            { id: 4, name: "Optimistic-Extrovert", class: "color-opt-ext" },
            { id: 5, name: "Optimistic-Introvert", class: "color-opt-int" },
            { id: 6, name: "Pessimistic-Extrovert", class: "color-pes-ext" },
            { id: 7, name: "Pessimistic-Introvert", class: "color-pes-int" }
        ];

        // 2. Helper Functions
        function getRandomPersonality() {
            const randomIndex = Math.floor(Math.random() * personalities.length);
            return personalities[randomIndex];
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // 3. Generate Initial Data
        const families = [
            {
                id: "Family A",
                stressLevel: getRandomInt(10, 90),
                freenessLevel: getRandomInt(10, 90),
                dynamicsScore: getRandomInt(10, 90),
                members: {
                    parent1: { name: "Parent 1", trait: getRandomPersonality(), age: 45 },
                    parent2: { name: "Parent 2", trait: getRandomPersonality(), age: 43 },
                    offspring: [
                        { name: "Child 1", trait: getRandomPersonality(), age: 18 },
                        { name: "Child 2", trait: getRandomPersonality(), age: 15 }
                    ]
                }
            },
            {
                id: "Family B",
                stressLevel: getRandomInt(10, 90),
                freenessLevel: getRandomInt(10, 90),
                dynamicsScore: getRandomInt(10, 90),
                members: {
                    parent1: { name: "Parent 1", trait: getRandomPersonality(), age: 50 },
                    parent2: { name: "Parent 2", trait: getRandomPersonality(), age: 48 },
                    offspring: [
                        { name: "Child 1", trait: getRandomPersonality(), age: 22 }
                    ]
                }
            }
        ];

        // 4. Render Families to the DOM
        const container = document.getElementById('simulation-container');

        families.forEach((family, index) => {
            // Create Family Card
            const famCard = document.createElement('div');
            famCard.className = 'family-card';
            famCard.onclick = () => showFamilyData(family);

            // Family Header
            famCard.innerHTML = `<div class="family-header">${family.id}</div>`;

            // Parents Container
            const parentsDiv = document.createElement('div');
            parentsDiv.className = 'parents-container';
            
            [family.members.parent1, family.members.parent2].forEach(parent => {
                parentsDiv.appendChild(createIndividualCard(parent, 'Parent'));
            });
            famCard.appendChild(parentsDiv);

            // Offspring Container
            const offspringDiv = document.createElement('div');
            offspringDiv.className = 'offspring-container';
            
            family.members.offspring.forEach(child => {
                offspringDiv.appendChild(createIndividualCard(child, 'Offspring'));
            });
            famCard.appendChild(offspringDiv);

            container.appendChild(famCard);
        });

        function createIndividualCard(person, role) {
            const card = document.createElement('div');
            card.className = 'individual-card';
            
            // Stop single click from triggering the family card overlay
            card.onclick = (e) => e.stopPropagation(); 
            // Double click triggers individual data overlay
            card.ondblclick = (e) => {
                e.stopPropagation();
                showIndividualData(person, role);
            };

            card.innerHTML = `
                <div class="role-label">${role}</div>
                <div>${person.name}</div>
                <div class="${person.trait.class}" style="font-size: 0.8rem; margin-top: 5px;">${person.trait.name}</div>
            `;
            return card;
        }

        // 5. Overlay Logic
        const overlay = document.getElementById('data-overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayBody = document.getElementById('overlay-body');

        function showFamilyData(family) {
            overlayTitle.innerText = `${family.id} Dynamics`;
            overlayBody.innerHTML = `
                <div class="data-row"><span>Household Stress:</span> <span>${family.stressLevel}%</span></div>
                <div class="data-row"><span>Freeness/Autonomy:</span> <span>${family.freenessLevel}%</span></div>
                <div class="data-row"><span>Overall Dynamics Score:</span> <span>${family.dynamicsScore}/100</span></div>
            `;
            overlay.style.display = 'flex';
        }

        function showIndividualData(person, role) {
            overlayTitle.innerText = `${person.name} (${role})`;
            overlayBody.innerHTML = `
                <div class="data-row"><span>Age:</span> <span>${person.age}</span></div>
                <div class="data-row">
                    <span>Dominant Trait:</span> 
                    <span class="${person.trait.class} font-weight-bold">${person.trait.name}</span>
                </div>
                <div class="data-row"><span>Genetic ID:</span> <span>#Gen${Math.floor(Math.random() * 9000) + 1000}</span></div>
            `;
            overlay.style.display = 'flex';
        }

        function closeOverlay() {
            overlay.style.display = 'none';
        }

        // Close overlay if user clicks outside the box
        window.onclick = function(event) {
            if (event.target == overlay) {
                closeOverlay();
            }
        }
    </script>
</body>
  </html>
